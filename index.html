const {useRef,useEffect,useState} = React;

/* ── FadingVideo ── */
function FadingVideo({src,className,style}){
  const videoRef=useRef(null),rAFRef=useRef(null),fadingOutRef=useRef(false);
  const FADE_MS=500,FADE_OUT_LEAD=0.55;
  useEffect(()=>{
    const v=videoRef.current;if(!v)return;
    function fadeTo(t,d){
      if(rAFRef.current)cancelAnimationFrame(rAFRef.current);
      const s=parseFloat(v.style.opacity)||0,st=performance.now();
      function step(n){const e=n-st,p=Math.min(e/d,1);v.style.opacity=s+(t-s)*p;if(p<1)rAFRef.current=requestAnimationFrame(step)}
      rAFRef.current=requestAnimationFrame(step);
    }
    const onLoad=()=>{v.style.opacity="0";v.play().catch(()=>{});fadeTo(1,FADE_MS)};
    const onTime=()=>{if(!fadingOutRef.current&&v.duration&&v.duration-v.currentTime<=FADE_OUT_LEAD&&v.duration-v.currentTime>0){fadingOutRef.current=true;fadeTo(0,FADE_MS)}};
    const onEnd=()=>{v.style.opacity="0";setTimeout(()=>{v.currentTime=0;v.play().catch(()=>{});fadingOutRef.current=false;fadeTo(1,FADE_MS)},100)};
    v.addEventListener("loadeddata",onLoad);v.addEventListener("timeupdate",onTime);v.addEventListener("ended",onEnd);
    return()=>{if(rAFRef.current)cancelAnimationFrame(rAFRef.current);v.removeEventListener("loadeddata",onLoad);v.removeEventListener("timeupdate",onTime);v.removeEventListener("ended",onEnd)};
  },[src]);
  return <video ref={videoRef} src={src} autoPlay muted playsInline preload="auto" className={className} style={{opacity:0,...style}}/>;
}

/* ── useInView ── */
function useInView(threshold=0.1){
  const ref=useRef(null);const[visible,setVisible]=useState(false);
  useEffect(()=>{const el=ref.current;if(!el)return;const obs=new IntersectionObserver(([e])=>{if(e.isIntersecting){setVisible(true);obs.disconnect()}},{threshold});obs.observe(el);return()=>obs.disconnect()},[]);
  return[ref,visible];
}

/* ── AnimFade ── */
function AnimFade({delay=0,className="",children,...props}){
  const[ref,visible]=useInView();
  return <div ref={ref} className={`anim-fade ${visible?"visible":""} ${className}`} style={{transitionDelay:`${delay}s`}} {...props}>{children}</div>;
}

/* ── BlurText ── */
function BlurText({text,className}){
  const[ref,visible]=useInView();
  const words=text.split(" ");
  return(
    <p ref={ref} className={className} style={{display:"flex",flexWrap:"wrap",justifyContent:"center",rowGap:"0.1em"}}>
      {words.map((w,i)=>(
        <span key={i} className="blur-word" style={{marginRight:"0.28em",animationDelay:`${(i*100)/1000}s`,animationPlayState:visible?"running":"paused",opacity:visible?undefined:0}}>{w}</span>
      ))}
    </p>
  );
}

function Navbar(){
  const links=["Home","Portfolio","Services","Process","Contact"];
  const [active, setActive] = useState("home");
  const [pillStyle, setPillStyle] = useState({});
  const navRef = useRef(null);

  useEffect(() => {
    const handleScroll = () => {
      let current = "home";
      for (const link of links) {
        const id = link.toLowerCase();
        const element = document.getElementById(id);
        if (element) {
          const rect = element.getBoundingClientRect();
          if (rect.top <= window.innerHeight * 0.4) {
            current = id;
          }
        }
      }
      setActive(current);
    };

    window.addEventListener("scroll", handleScroll);
    handleScroll();
    return () => window.removeEventListener("scroll", handleScroll);
  }, []);

  useEffect(() => {
    if (!navRef.current) return;
    const activeEl = navRef.current.querySelector(`[data-link="${active}"]`);
    if (activeEl) {
      setPillStyle({
        left: activeEl.offsetLeft,
        top: activeEl.offsetTop,
        width: activeEl.offsetWidth,
        height: activeEl.offsetHeight,

    }
  }, [active]);

}

function Carousel3D(){
  const[active,setActive]=useState(0);
  const videoRefs=useRef([]);
  const total=portfolioItems.length;
  const dragRef=useRef({startX:0,dragging:false});
  const viewportRef=useRef(null);
  const wheelLock=useRef(false);
  const goRef=useRef(null);

  const navigate=(dir)=>setActive(a=>(a+dir+total)%total);
  goRef.current=navigate;

  useEffect(()=>{
    videoRefs.current.forEach((v,i)=>{
      if(!v)return;
      if(i===active){v.currentTime=0;v.play().catch(()=>{});}
      else{v.pause();v.currentTime=0;}
    });
  },[active]);

  /* Mouse drag */
  const onMouseDown=(e)=>{dragRef.current={startX:e.clientX,dragging:true};e.preventDefault()};
  useEffect(()=>{
    const onMove=(e)=>{if(!dragRef.current.dragging)return;e.preventDefault()};
    const onUp=(e)=>{
      if(!dragRef.current.dragging)return;
      const dx=e.clientX-dragRef.current.startX;
      dragRef.current.dragging=false;
      if(Math.abs(dx)>40){dx<0?goRef.current(1):goRef.current(-1)}
    };
    window.addEventListener("mousemove",onMove);
    window.addEventListener("mouseup",onUp);
    return()=>{window.removeEventListener("mousemove",onMove);window.removeEventListener("mouseup",onUp)};
  },[]);

  /* Touch swipe */
  const touchRef=useRef(0);
  const onTouchStart=(e)=>{touchRef.current=e.touches[0].clientX};
  const onTouchEnd=(e)=>{
    const dx=e.changedTouches[0].clientX-touchRef.current;
    if(Math.abs(dx)>40){dx<0?goRef.current(1):goRef.current(-1)}
  };

  /* Scroll wheel */
  useEffect(()=>{
    const el=viewportRef.current;if(!el)return;
    const onWheel=(e)=>{
      e.preventDefault();
      if(wheelLock.current)return;
      wheelLock.current=true;
      if(e.deltaY>0||e.deltaX>0)goRef.current(1);
      else goRef.current(-1);
      setTimeout(()=>{wheelLock.current=false},400);
    };
    el.addEventListener("wheel",onWheel,{passive:false});
    return()=>el.removeEventListener("wheel",onWheel);
  },[]);

  const getStyle=(i)=>{
    let diff=i-active;
    if(diff>total/2)diff-=total;
    if(diff<-total/2)diff+=total;
    const absDiff=Math.abs(diff);
    if(absDiff>3)return{opacity:0,transform:"scale(0.4) translateX(0px)",zIndex:0,overlayOpacity:1};
    const tx=diff*220;
    const sc=1-absDiff*0.15;
    const op=1-absDiff*0.3;
    const ry=diff*-8;
    const z=10-absDiff;
    return{
      opacity:1,
      transform:`translateX(${tx}px) scale(${Math.max(sc,0.5)}) rotateY(${ry}deg)`,
      zIndex:z,
      filter:absDiff>0?`blur(${absDiff*1.5}px)`:"none",
      overlayOpacity: 1 - Math.max(op,0)
    };
  };

  return(
    <div className="relative flex flex-col items-center">
      <div ref={viewportRef} onMouseDown={onMouseDown} onTouchStart={onTouchStart} onTouchEnd={onTouchEnd}
        className="relative w-full flex items-center justify-center select-none cursor-grab active:cursor-grabbing"
        style={{perspective:"1200px",height:"520px"}}>
        {portfolioItems.map((item,i)=>{
          const { overlayOpacity, ...st }=getStyle(i);
          return(
            <div key={i} className="absolute" style={{
              ...st,
              width:"280px",
              transition:"all 0.6s cubic-bezier(0.25,1,0.5,1)",
              transformStyle:"preserve-3d",
              pointerEvents: i === active ? "auto" : "none"
            }}>
              <div 
                className="rounded-[1.25rem] overflow-hidden relative bg-black"
                onMouseEnter={() => { if(videoRefs.current[i]) videoRefs.current[i].muted = false; }}
                onMouseLeave={() => { if(videoRefs.current[i]) videoRefs.current[i].muted = true; }}
              >
                <div className="relative aspect-[9/16] w-full overflow-hidden bg-black">
                  <video ref={el=>videoRefs.current[i]=el} src={item.src} muted loop playsInline preload="metadata" className="absolute inset-0 w-full h-full object-cover"/>
                  <div className="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-transparent pointer-events-none"/>
                  <div className="absolute inset-0 bg-black pointer-events-none" style={{ opacity: overlayOpacity, transition: "opacity 0.6s cubic-bezier(0.25,1,0.5,1)" }}/>
                  <div className="absolute bottom-0 left-0 right-0 p-4 pointer-events-none">
                    <span className="text-[11px] text-white/60 font-body uppercase tracking-wider">{item.category}</span>
                    <h4 className="font-heading italic text-white text-xl mt-1 leading-tight">{item.title}</h4>

                  WebkitMask: "linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0)",
                  WebkitMaskComposite: "xor",
                  maskComposite: "exclude",

                }}/>
              </div>

function CaseStudyCard({ img }) {
  const cardRef = React.useRef(null);
  const [style, setStyle] = React.useState({ zIndex: 10, transform: 'translate3d(0px, 0px, 0) scale(1)' });
  const [isHovered, setIsHovered] = React.useState(false);

  const handleMouseEnter = () => {
    setIsHovered(true);
    if (!cardRef.current) return;
    const rect = cardRef.current.getBoundingClientRect();
    const centerX = window.innerWidth / 2;
    const centerY = window.innerHeight / 2;
    
    const cardCenterX = rect.left + rect.width / 2;
    const cardCenterY = rect.top + rect.height / 2;
    
    const moveX = centerX - cardCenterX;
    const moveY = centerY - cardCenterY;
    
    const scaleFactor = window.innerWidth < 768 ? 1.5 : 2.5;

    setStyle({
      transform: `translate3d(${moveX}px, ${moveY}px, 0) scale(${scaleFactor})`,
      zIndex: 100
    });
  };

  const handleMouseLeave = () => {
    setIsHovered(false);
    setStyle({ transform: 'translate3d(0px, 0px, 0) scale(1)', zIndex: 10 });
  };

  return (
    <div 
      ref={cardRef}
      onMouseEnter={handleMouseEnter}
      onMouseLeave={handleMouseLeave}
      className="relative flex-shrink-0 w-[200px] md:w-[280px] h-[150px] md:h-[210px]"
    >
      <div
        style={style}
        className="absolute inset-0 w-full h-full rounded-[1rem] transition-all duration-[600ms] ease-[cubic-bezier(0.25,1,0.5,1)] pointer-events-none will-change-transform"
      >
        <img 
          src={img} 
          alt={`Design showcase`} 
          className="absolute inset-0 w-full h-full object-cover rounded-[1rem] shadow-[0_30px_60px_rgba(0,0,0,0.9)]" 
        />
        <div className={`absolute inset-0 bg-black/40 pointer-events-none rounded-[1rem] transition-colors duration-500 ${isHovered ? 'bg-transparent' : ''}`} />
      </div>
    </div>
  );
}

          </AnimFade>
        </div>
      </div>
    </section>
  );
}
